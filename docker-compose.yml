services:
  notebook:
    image: quay.io/jupyter/pyspark-notebook:latest
    container_name: billups-pyspark-notebook
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    working_dir: /home/jovyan/work
    environment:
      PYTHONPATH: /usr/local/spark/python:/usr/local/spark/python/lib/py4j-0.10.9.9-src.zip:/usr/local/spark/python/lib/pyspark.zip
    command: start-notebook.py --NotebookApp.token='' --NotebookApp.password=''
